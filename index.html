<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이층 : 서울, 0시</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <!-- BGM -->
            <audio id="bgm-title" loop preload="auto">
                <source src="assets/audio/title_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-prologue" loop preload="auto">
                <source src="assets/audio/prologue_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch1" loop preload="auto">
                <source src="assets/audio/ch1_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch1-battle" loop preload="auto">
                <source src="assets/audio/ch1_battle_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch2" loop preload="auto">
                <source src="assets/audio/ch2_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch3" loop preload="auto">
                <source src="assets/audio/ch3_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch3-tense" loop preload="auto">
                <source src="assets/audio/ch3_tense_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch4" loop preload="auto">
                <source src="assets/audio/ch4_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch4-combat" loop preload="auto">
                <source src="assets/audio/ch4_combat_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch4-hero" loop preload="auto">
                <source src="assets/audio/ch4_hero_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch5" loop preload="auto">
                <source src="assets/audio/ch5_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch5-calm" loop preload="auto">
                <source src="assets/audio/ch5_calm_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch6" loop preload="auto">
                <source src="assets/audio/ch6_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch7" loop preload="auto">
                <source src="assets/audio/ch7_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch8" loop preload="auto">
                <source src="assets/audio/ch8_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch8-tense" loop preload="auto">
                <source src="assets/audio/ch8_tense_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch8-combat" loop preload="auto">
                <source src="assets/audio/ch8_combat_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch9" loop preload="auto">
                <source src="assets/audio/ch9_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch10" loop preload="auto">
                <source src="assets/audio/ch10_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch10-solemn" loop preload="auto">
                <source src="assets/audio/ch10_solemn_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch11" loop preload="auto">
                <source src="assets/audio/ch11_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch11-combat" loop preload="auto">
                <source src="assets/audio/ch11_combat_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch11-awakening" loop preload="auto">
                <source src="assets/audio/ch11_awakening_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch12" loop preload="auto">
                <source src="assets/audio/ch12_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch12-ritual" loop preload="auto">
                <source src="assets/audio/ch12_ritual_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch12-battle" loop preload="auto">
                <source src="assets/audio/ch12_battle_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch12-song" loop preload="auto">
                <source src="assets/audio/ch12_song_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch13" loop preload="auto">
                <source src="assets/audio/ch13_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch13-true" loop preload="auto">
                <source src="assets/audio/ch13_true_bgm.mp3" type="audio/mpeg">
            </audio>
            <audio id="bgm-ch13-credits" loop preload="auto">
                <source src="assets/audio/ch13_credits_bgm.mp3" type="audio/mpeg">
            </audio>

            <!-- 인트로 화면 -->
            <div id="intro-screen" class="screen active">
                <p class="intro-question">진실을 마주할 준비가 되어 있습니까?</p>
                <div class="intro-choices">
                    <button id="btn-intro-yes" class="intro-btn" data-text="YES">YES</button>
                    <button id="btn-intro-no" class="intro-btn" data-text="NO">NO</button>
                </div>
            </div>

            <!-- 타이틀 화면 -->
            <div id="title-screen" class="screen">
                <div class="title-bg"></div>
                <div class="title-overlay">
                    <div class="title-top-line"></div>
                    <h1 class="title-main">
                        <span class="title-hanja">裏層</span>
                        이층
                    </h1>
                    <div class="title-divider">
                        <span class="divider-line"></span>
                        <span class="divider-dot">:</span>
                        <span class="divider-line"></span>
                    </div>
                    <p class="title-sub">서울, 0시</p>
                    <p class="title-tagline">아무도 없는 서울에서, 당신의 선택이 시작된다</p>
                    <button id="btn-continue" class="title-btn title-btn-secondary hidden">이어하기</button>
                    <button id="btn-start" class="title-btn">
                        <span class="btn-line left"></span>
                        시작하기
                        <span class="btn-line right"></span>
                    </button>
                    <p id="title-endings-counter" class="title-endings-counter hidden"></p>
                    <div class="title-bottom-line"></div>
                </div>
                <!-- 떠다니는 한자 파티클 -->
                <div class="title-particles">
                    <span class="particle" style="--delay:0s; --x:15%; --y:20%">封</span>
                    <span class="particle" style="--delay:2s; --x:80%; --y:35%">印</span>
                    <span class="particle" style="--delay:4s; --x:25%; --y:70%">魂</span>
                    <span class="particle" style="--delay:1s; --x:70%; --y:75%">鬼</span>
                    <span class="particle" style="--delay:3s; --x:50%; --y:15%">夜</span>
                    <span class="particle" style="--delay:5s; --x:85%; --y:60%">門</span>
                    <span class="particle" style="--delay:2.5s; --x:10%; --y:50%">氣</span>
                </div>
            </div>

            <!-- 게임 화면 -->
            <div id="game-screen" class="screen">
                <div id="scene-image-container">
                    <img id="scene-image-prev" class="scene-img-layer" src="" alt="">
                    <img id="scene-image" class="scene-img-layer" src="" alt="">
                    <div id="scene-overlay"></div>
                    <img id="character-left" class="character-slot" src="" alt="">
                    <img id="character-center" class="character-slot" src="" alt="">
                    <img id="character-right" class="character-slot" src="" alt="">
                </div>

                <div id="stats-bar">
                    <div class="stat" id="stat-love">
                        <span class="stat-icon">♥</span>
                        <span class="stat-label">사랑</span>
                        <div class="stat-bar"><div class="stat-fill" data-stat="love"></div></div>
                        <span class="stat-value" data-stat="love">0</span>
                    </div>
                    <div class="stat" id="stat-courage">
                        <span class="stat-icon">▲</span>
                        <span class="stat-label">용기</span>
                        <div class="stat-bar"><div class="stat-fill" data-stat="courage"></div></div>
                        <span class="stat-value" data-stat="courage">0</span>
                    </div>
                    <div class="stat" id="stat-wisdom">
                        <span class="stat-icon">◆</span>
                        <span class="stat-label">지혜</span>
                        <div class="stat-bar"><div class="stat-fill" data-stat="wisdom"></div></div>
                        <span class="stat-value" data-stat="wisdom">0</span>
                    </div>
                    <div class="stat" id="stat-calm">
                        <span class="stat-icon">●</span>
                        <span class="stat-label">평정</span>
                        <div class="stat-bar"><div class="stat-fill" data-stat="calm"></div></div>
                        <span class="stat-value" data-stat="calm">0</span>
                    </div>
                </div>

                <!-- 동료 HUD -->
                <div id="companion-hud" class="hidden"></div>

                <!-- 동료 획득 알림 -->
                <div id="companion-notify" class="hidden">
                    <div class="companion-notify-inner">
                        <img id="companion-notify-portrait" src="" alt="">
                        <div class="companion-notify-text">
                            <span class="companion-notify-label">동료</span>
                            <span id="companion-notify-name"></span>
                        </div>
                    </div>
                </div>

                <div id="dialogue-container" class="hidden">
                    <div id="speaker-name"></div>
                    <div id="dialogue-text"></div>
                    <div id="dialogue-continue">&#9660; 계속</div>
                    <div id="dialogue-tap-hint">
                        <span class="tap-hint-icon"></span>
                        <span class="tap-hint-text">탭하여 진행</span>
                    </div>
                </div>

                <div id="choices-container" class="hidden">
                    <div id="choice-timer" class="hidden">
                        <span id="choice-timer-text"></span>
                        <div class="choice-timer-track"><div id="choice-timer-bar"></div></div>
                    </div>
                </div>
                <div id="hotspot-container"></div>
                <div id="stat-notification" class="hidden"></div>

                <!-- 호감도 이벤트 오버레이 -->
                <div id="affinity-event-overlay" class="hidden">
                    <span class="affinity-event-icon">♥</span>
                    <span class="affinity-event-label">호감도 이벤트</span>
                    <span id="affinity-event-name"></span>
                </div>
            </div>

            <!-- 챕터 전환 -->
            <div id="chapter-screen" class="screen">
                <div class="chapter-content">
                    <p class="chapter-number"></p>
                    <h2 class="chapter-title"></h2>
                </div>
            </div>

            <!-- 분기 플로우차트 -->
            <div id="flowchart-screen" class="screen">
                <div class="flowchart-wrapper">
                    <div class="flowchart-header">
                        <p class="flowchart-episode"></p>
                        <h2 class="flowchart-title"></h2>
                    </div>
                    <div class="flowchart-scroll">
                        <div class="flowchart-tree" id="flowchart-tree"></div>
                    </div>
                    <button id="btn-flowchart-close" class="flowchart-close-btn">계속하기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="scenario.js"></script>
    <script src="scenario_ch1.js"></script>
    <script src="scenario_ch2.js"></script>
    <script src="scenario_ch3.js"></script>
    <script src="scenario_ch4.js"></script>
    <script src="scenario_ch5.js"></script>
    <script src="scenario_ch6.js"></script>
    <script src="scenario_ch7.js"></script>
    <script src="scenario_ch8.js"></script>
    <script src="scenario_ch9.js"></script>
    <script src="scenario_ch10.js"></script>
    <script src="scenario_ch11.js"></script>
    <script src="scenario_ch12.js"></script>
    <script src="scenario_ch13.js"></script>
    <script src="scenario_affinity.js"></script>
    <script type="module" src="stats.js"></script>
    <script src="main.js"></script>
</body>
</html>
